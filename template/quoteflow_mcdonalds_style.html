
<h2 class="sr-only">麥當勞風格報價單選購流程互動原型，包含顧客資料、產品選擇、報價確認三個步驟</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary)}
.app{display:grid;grid-template-rows:auto 1fr;min-height:520px}
.topbar{background:#1a4a7a;color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:14px;font-weight:500}
.topbar-customer{font-size:12px;opacity:.85;display:flex;align-items:center;gap:8px}
.step-bar{display:flex;border-bottom:0.5px solid var(--color-border-secondary)}
.step{flex:1;padding:8px 0;text-align:center;font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;gap:5px;position:relative;cursor:pointer}
.step.active{color:#1a4a7a;font-weight:500;border-bottom:2px solid #1a4a7a}
.step.done{color:var(--color-text-success)}
.step-num{width:20px;height:20px;border-radius:50%;border:0.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:11px}
.step.active .step-num{background:#1a4a7a;color:#fff;border-color:#1a4a7a}
.step.done .step-num{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.body{display:grid;grid-template-columns:1fr 280px;height:460px}
.left{overflow-y:auto;padding:10px 12px}
.right{border-left:0.5px solid var(--color-border-secondary);display:flex;flex-direction:column}
.panel{display:none}.panel.visible{display:block}
.section-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:500;letter-spacing:.03em}
.customer-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:2px}
.field label{font-size:11px;color:var(--color-text-secondary)}
.field span{font-size:13px;color:var(--color-text-primary);font-weight:500}
.field input{height:28px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:0 8px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.field select{height:28px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:0 6px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:10px 0}
.cat-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.cat-tab{padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);font-size:11px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary)}
.cat-tab.active{background:#1a4a7a;color:#fff;border-color:#1a4a7a}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prod-card{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:10px;cursor:pointer;background:var(--color-background-primary);transition:border-color .15s}
.prod-card:hover{border-color:#1a4a7a}
.prod-card.in-cart{border-color:#1a4a7a;background:var(--color-background-info)}
.prod-code{font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;font-family:var(--font-mono)}
.prod-name{font-size:12px;font-weight:500;margin-bottom:4px;line-height:1.3}
.prod-spec{font-size:10px;color:var(--color-text-secondary);line-height:1.4;margin-bottom:6px;max-height:40px;overflow:hidden}
.prod-footer{display:flex;align-items:center;justify-content:space-between}
.prod-price{font-size:13px;font-weight:500;color:#1a4a7a}
.add-btn{width:22px;height:22px;border-radius:50%;background:#1a4a7a;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1}
.add-btn.remove{background:var(--color-background-danger);color:var(--color-text-danger);font-size:18px}
.cart-header{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.cart-items{flex:1;overflow-y:auto;padding:8px 12px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--color-text-secondary);font-size:12px;gap:6px}
.cart-item{padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.cart-item-name{font-size:11px;font-weight:500;margin-bottom:3px}
.cart-item-code{font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono)}
.cart-item-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.qty-ctrl{display:flex;align-items:center;gap:5px}
.qty-btn{width:18px;height:18px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary)}
.qty-num{font-size:12px;font-weight:500;min-width:16px;text-align:center}
.item-subtotal{font-size:12px;font-weight:500}
.cart-footer{padding:10px 12px;border-top:0.5px solid var(--color-border-secondary)}
.total-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--color-text-secondary)}
.grand-total{display:flex;justify-content:space-between;font-size:14px;font-weight:500;margin-bottom:10px}
.next-btn{width:100%;padding:8px;border:none;border-radius:var(--border-radius-md);background:#1a4a7a;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.next-btn:disabled{opacity:.4;cursor:default}
.confirm-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.confirm-table th{text-align:left;padding:5px 6px;border-bottom:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);font-weight:500;font-size:11px}
.confirm-table td{padding:5px 6px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:top}
.confirm-table td:last-child,.confirm-table th:last-child{text-align:right}
.summary-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:10px}
.summary-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--color-text-secondary)}
.summary-total{display:flex;justify-content:space-between;font-size:14px;font-weight:500;padding-top:6px;border-top:0.5px solid var(--color-border-secondary);margin-top:4px}
.gen-btn{width:100%;padding:9px;border:none;border-radius:var(--border-radius-md);background:#2d7d46;color:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.badge{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.badge-info{background:var(--color-background-info);color:var(--color-text-info)}
.badge-success{background:var(--color-background-success);color:var(--color-text-success)}
.success-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;text-align:center}
.success-icon{width:56px;height:56px;border-radius:50%;background:var(--color-background-success);display:flex;align-items:center;justify-content:center}
.price-edit{width:70px;border:0.5px solid var(--color-border-secondary);border-radius:4px;padding:2px 4px;font-size:12px;text-align:right;background:var(--color-background-primary);color:var(--color-text-primary)}
</style>

<div class="app">
  <div class="topbar">
    <span class="topbar-title"><i class="ti ti-file-invoice" aria-hidden="true" style="margin-right:6px"></i>立善科技 QuoteFlow</span>
    <span class="topbar-customer" id="topbar-cust"><i class="ti ti-user" aria-hidden="true"></i>雅茗有限公司 ／ 斗佰小姐</span>
  </div>
  <div class="step-bar">
    <div class="step done" id="s1" onclick="goStep(1)"><div class="step-num"><i class="ti ti-check" aria-hidden="true" style="font-size:11px"></i></div>顧客資料</div>
    <div class="step active" id="s2" onclick="goStep(2)"><div class="step-num">2</div>選取品項</div>
    <div class="step" id="s3" onclick="goStep(3)"><div class="step-num">3</div>報價確認</div>
  </div>
  <div class="body">
    <div class="left">

      <div class="panel" id="p1">
        <div class="section-label">從 Trello 卡片載入</div>
        <div class="customer-grid">
          <div class="field"><label>客戶全名</label><span>雅茗有限公司</span></div>
          <div class="field"><label>聯絡人</label><span>斗佰小姐</span></div>
          <div class="field"><label>聯絡電話</label><span>02-2345-6789</span></div>
          <div class="field"><label>聯絡地址</label><span>新北市新店區</span></div>
        </div>
        <hr class="divider">
        <div class="section-label">補填資料</div>
        <div class="customer-grid">
          <div class="field"><label>報價日期</label><input type="date" value="2026-05-22"></div>
          <div class="field"><label>有效日期</label><input type="date" value="2026-06-06"></div>
          <div class="field"><label>製表人員</label><select><option>小暈</option><option>小皋</option></select></div>
          <div class="field"><label>報價單號</label><input type="text" value="CH1150522001"></div>
          <div class="field"><label>幣別</label><select><option>TWD</option><option>USD</option></select></div>
          <div class="field"><label>統一編號</label><input type="text" placeholder="（選填）"></div>
        </div>
        <button class="next-btn" style="margin-top:12px" onclick="goStep(2)">下一步：選取品項 →</button>

      <div class="panel visible" id="p2">
        <div class="cat-tabs" id="cat-tabs">
          <div class="cat-tab active" onclick="filterCat('all',this)">全部</div>
          <div class="cat-tab" onclick="filterCat('AP-1',this)">AP-1x 系列</div>
          <div class="cat-tab" onclick="filterCat('AP-3',this)">AP-3x 系列</div>
          <div class="cat-tab" onclick="filterCat('AP-5',this)">AP-5x 系列</div>
          <div class="cat-tab" onclick="filterCat('AP-8',this)">AP-8x 系列</div>
        </div>
        <div class="prod-grid" id="prod-grid"></div>
      </div>

      <div class="panel" id="p3">
        <div class="section-label" style="margin-bottom:10px">報價內容確認</div>
        <div class="customer-grid" style="margin-bottom:10px">
          <div class="field"><label>客戶</label><span id="cf-cust">雅茗有限公司</span></div>
          <div class="field"><label>聯絡人</label><span>斗佰小姐</span></div>
          <div class="field"><label>報價單號</label><span>CH1150522001</span></div>
          <div class="field"><label>報價日期</label><span>2026/05/22</span></div>
        </div>
        <table class="confirm-table" id="confirm-table">
          <thead><tr><th>品號</th><th>品名 / 規格</th><th>數量</th><th>單價</th><th>小計</th></tr></thead>
          <tbody id="confirm-body"></tbody>
        </table>
        <div class="summary-box">
          <div class="summary-row"><span>小計</span><span id="cf-sub">$0</span></div>
          <div class="summary-row"><span>營業稅 5%</span><span id="cf-tax">$0</span></div>
          <div class="summary-total"><span>應收總金額</span><span id="cf-total">$0</span></div>
        </div>
        <button class="gen-btn" id="gen-btn" onclick="generateQuote()">
          <i class="ti ti-file-export" aria-hidden="true"></i> 生成報價單 .xlsx
        </button>
        <div id="success-area"></div>

    </div>

    <div class="right">
      <div class="cart-header">
        <span><i class="ti ti-shopping-cart" aria-hidden="true" style="margin-right:4px"></i>報價清單</span>
        <span id="cart-count" class="badge badge-info">0 項</span>
      </div>
      <div class="cart-items" id="cart-items">
        <div class="cart-empty" id="cart-empty">
          <i class="ti ti-package-off" aria-hidden="true" style="font-size:28px;color:var(--color-text-secondary)"></i>
          <span>點擊左側產品加入</span>
        </div>
      </div>
      <div class="cart-footer">
        <div class="total-row"><span>小計</span><span id="subtotal">$0</span></div>
        <div class="total-row"><span>營業稅 5%</span><span id="tax">$0</span></div>
        <div class="grand-total"><span>合計</span><span id="total">$0</span></div>
        <button class="next-btn" id="checkout-btn" disabled onclick="goStep(3)">確認報價內容 →</button>
      </div>
    </div>
  </div>
</div>

<script>
const PRODUCTS = [
  {code:'AP-15WB', name:'AP-15WB 電動油壓升降台車（雙叉式）', spec:'載重 150KG｜面板 815×500mm｜最高 1370mm｜附煞車輪', unit:'台', price:39000},
  {code:'AP-15WB-P', name:'AP-15WB 電動油壓升降台車（雙叉式，粉塗）', spec:'載重 150KG｜粉體塗裝｜日本阪上油封｜過載保護', unit:'台', price:37200},
  {code:'AP-30B', name:'AP-30B 電動油壓升降台車', spec:'載重 300KG｜面板 815×500mm｜最高 860mm｜附煞車輪', unit:'台', price:35500},
  {code:'AP-30SB', name:'AP-30SB 電動油壓升降台車（雙叉式）', spec:'載重 300KG｜面板 1010×520mm｜最高 1610mm', unit:'台', price:44000},
  {code:'AP-50B', name:'AP-50B 電動式油壓升降台車', spec:'載重 500KG｜面板 1010×520mm｜最高 1018mm', unit:'台', price:38000},
  {code:'AP-50WB', name:'AP-50WB 電動油壓升降台車（雙叉式）', spec:'載重 500KG｜面板 1010×520mm｜最高 1600mm', unit:'台', price:46500},
  {code:'AP-80B', name:'AP-80B 電動油壓升降台車', spec:'載重 800KG｜面板 1010×520mm｜最高 97mm', unit:'台', price:41000},
];

let cart = {};
let currentCat = 'all';

function fmt(n){return '$'+Math.round(n).toLocaleString();}

function filterCat(cat, el){
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function renderProducts(){
  const grid = document.getElementById('prod-grid');
  const filtered = PRODUCTS.filter(p => currentCat === 'all' || p.code.startsWith(currentCat));
  grid.innerHTML = filtered.map(p => {
    const inCart = cart[p.code] && cart[p.code].qty > 0;
    return `<div class="prod-card${inCart?' in-cart':''}" id="pc-${p.code.replace(/[^a-zA-Z0-9]/g,'_')}">
      <div class="prod-code">${p.code}</div>
      <div class="prod-name">${p.name.replace(p.code+' ','')}</div>
      <div class="prod-spec">${p.spec}</div>
      <div class="prod-footer">
        <span class="prod-price">${fmt(p.price)}<span style="font-size:10px;font-weight:400;color:var(--color-text-secondary)"> /${p.unit}</span></span>
        <button class="add-btn" onclick="addToCart('${p.code}')" aria-label="加入 ${p.code}">+</button>
      </div>
    </div>`;
  }).join('');
}

function addToCart(code){
  const p = PRODUCTS.find(x=>x.code===code);
  if(!cart[code]) cart[code] = {product:p, qty:0, customPrice:p.price};
  cart[code].qty++;
  renderCart();
  renderProducts();
}

function changeQty(code, delta){
  if(!cart[code]) return;
  cart[code].qty = Math.max(0, cart[code].qty + delta);
  if(cart[code].qty === 0) delete cart[code];
  renderCart();
  renderProducts();
}

function updatePrice(code, val){
  if(cart[code]) cart[code].customPrice = parseFloat(val)||0;
  renderCart();
}

function renderCart(){
  const items = Object.values(cart).filter(x=>x.qty>0);
  const cartDiv = document.getElementById('cart-items');
  const empty = document.getElementById('cart-empty');
  const count = items.reduce((a,b)=>a+b.qty,0);
  document.getElementById('cart-count').textContent = count+' 項';
  if(items.length===0){
    cartDiv.innerHTML = '<div class="cart-empty" id="cart-empty"><i class="ti ti-package-off" aria-hidden="true" style="font-size:28px;color:var(--color-text-secondary)"></i><span>點擊左側產品加入</span></div>';
    document.getElementById('subtotal').textContent='$0';
    document.getElementById('tax').textContent='$0';
    document.getElementById('total').textContent='$0';
    document.getElementById('checkout-btn').disabled=true;
    return;
  }
  const sub = items.reduce((a,b)=>a+b.qty*b.customPrice,0);
  const tax = Math.round(sub*0.05);
  const tot = sub+tax;
  cartDiv.innerHTML = items.map(it=>`
    <div class="cart-item">
      <div class="cart-item-code">${it.product.code}</div>
      <div class="cart-item-name">${it.product.name.substring(0,24)}…</div>
      <div class="cart-item-row">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${it.product.code}',-1)" aria-label="減少數量">−</button>
          <span class="qty-num">${it.qty}</span>
          <button class="qty-btn" onclick="changeQty('${it.product.code}',1)" aria-label="增加數量">+</button>
        </div>
        <input class="price-edit" type="number" value="${it.customPrice}" onchange="updatePrice('${it.product.code}',this.value)" aria-label="單價">
      </div>
      <div style="text-align:right;font-size:11px;color:var(--color-text-secondary);margin-top:2px">${fmt(it.qty*it.customPrice)}</div>
    </div>`).join('');
  document.getElementById('subtotal').textContent=fmt(sub);
  document.getElementById('tax').textContent=fmt(tax);
  document.getElementById('total').textContent=fmt(tot);
  document.getElementById('checkout-btn').disabled=false;
}

function goStep(n){
  if(n===3 && Object.keys(cart).length===0) return;
  [1,2,3].forEach(i=>{
    document.getElementById('p'+i).classList.toggle('visible', i===n);
    const s = document.getElementById('s'+i);
    s.classList.remove('active','done');
    if(i===n) s.classList.add('active');
    else if(i<n) s.classList.add('done');
  });
  if(n===3) buildConfirm();
}

function buildConfirm(){
  const items = Object.values(cart).filter(x=>x.qty>0);
  const tbody = document.getElementById('confirm-body');
  tbody.innerHTML = items.map((it,i)=>`<tr>
    <td style="font-family:var(--font-mono);font-size:11px">${it.product.code}</td>
    <td>${it.product.name.substring(0,22)}</td>
    <td style="text-align:center">${it.qty} ${it.product.unit}</td>
    <td style="text-align:right">${fmt(it.customPrice)}</td>
    <td style="text-align:right;font-weight:500">${fmt(it.qty*it.customPrice)}</td>
  </tr>`).join('');
  const sub = items.reduce((a,b)=>a+b.qty*b.customPrice,0);
  const tax = Math.round(sub*0.05);
  document.getElementById('cf-sub').textContent=fmt(sub);
  document.getElementById('cf-tax').textContent=fmt(tax);
  document.getElementById('cf-total').textContent=fmt(sub+tax);
  document.getElementById('success-area').innerHTML='';
  document.getElementById('gen-btn').style.display='flex';
}

function generateQuote(){
  document.getElementById('gen-btn').style.display='none';
  document.getElementById('success-area').innerHTML=`
    <div class="success-screen">
      <div class="success-icon"><i class="ti ti-check" aria-hidden="true" style="font-size:26px;color:var(--color-text-success)"></i></div>
      <div style="font-weight:500;font-size:14px">報價單已生成</div>
      <div style="font-size:12px;color:var(--color-text-secondary)">Z:\\出貨單\\Quoteflow_output\\報價單_雅茗有限公司.xlsx</div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button onclick="goStep(2)" style="padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:12px">繼續編輯</button>
        <button onclick="sendPrompt('幫我把這份報價單的流程改成 Python 程式碼')" style="padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid #1a4a7a;color:#1a4a7a;background:var(--color-background-primary);cursor:pointer;font-size:12px">轉成程式碼 ↗</button>
      </div>
    </div>`;
}

renderProducts();
</script>
